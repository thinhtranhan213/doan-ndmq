server:
  port: 8080

spring:
  application:
    name: imdb

  datasource:
    url: jdbc:mysql://localhost:3306/jbox_demo?useUnicode=true&characterEncoding=UTF-8
    username: root
    password: 21436587
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true

  cache:
    type: redis
  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    org.hibernate.SQL: debug
    org.springframework.security: info

jwt:
  secret: change-this-to-long-secret-key
  expiration: 86400000

imdb:
  pagination:
    default-size: 20
    max-size: 100